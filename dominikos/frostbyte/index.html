<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#122a42" />
  <title>Frostbyte — a Dominik Machowiak original</title>
  <meta name="description" content="Frostbyte: a cosy penguin hangout, an original mini-world built by Dominik Machowiak." />
  <link rel="icon" href="/os/icons/frostbyte.svg" />
  <style>
    :root { --bg:#122a42; --ink:#f4f8fc; --accent:#7fd6ff; --panel:#0d1c2b; }
    * { box-sizing: border-box; }
    html, body { margin:0; height:100%; background:var(--bg); color:var(--ink);
      font-family: ui-rounded, "Segoe UI", system-ui, sans-serif; overflow:hidden; overscroll-behavior:none; }
    #game { position:fixed; inset:0; width:100%; height:100%; display:block; touch-action:none; }

    /* ---- HUD ---- */
    .hud { position:fixed; z-index:5; pointer-events:none; }
    #titlebar { top:0; left:0; right:0; padding:10px 14px; display:flex; gap:12px; align-items:center;
      background:linear-gradient(#122a42ee, #122a4200); }
    #titlebar .name { font-weight:800; letter-spacing:.3px; font-size:15px; }
    #back-link { pointer-events:auto; text-decoration:none; color:var(--ink); font-size:12.5px;
      border:1px solid #ffffff33; padding:6px 11px; border-radius:999px; background:#ffffff10; white-space:nowrap; }
    #back-link:hover { background:#ffffff22; }
    #titlebar .spacer { flex:1; }

    #coin-counter { top:54px; right:12px; font-size:12px; font-weight:700; color:#0d1c2b;
      background:var(--accent); padding:5px 11px; border-radius:999px; box-shadow:0 2px 8px #0006; }

    /* ---- Dialogue overlay (NPC speech / shop / dress-up), game1 typeHtml pattern ---- */
    #dialogue-overlay { position:fixed; inset:0; z-index:30; display:flex; align-items:flex-end;
      justify-content:center; padding:0 0 max(18px, env(safe-area-inset-bottom)); background:#0006; }
    #dialogue-overlay.hidden { display:none; }
    #dialogue-box { width:min(680px, 94vw); background:#fbfbfe; color:#1a1a22; border-radius:16px;
      box-shadow:0 18px 50px #000a; padding:18px 20px; border:3px solid #0d1c2b; }
    #dialogue-header { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; margin-bottom:8px; }
    #dialogue-title { margin:0; font-size:19px; }
    #dialogue-body { font-size:16px; line-height:1.55; min-height:2.6em; }
    #dialogue-footer { display:flex; align-items:center; gap:10px; margin-top:16px; }
    #dialogue-footer button { font:inherit; font-weight:700; border-radius:10px; padding:9px 15px;
      cursor:pointer; border:2px solid #0d1c2b; background:#fff; }
    #dialogue-close { margin-left:auto; background:#122a42 !important; color:#fff; }

    /* ---- Dress Up HUD button ---- */
    #dressup-btn { position:fixed; z-index:6; right:12px; bottom:14px; pointer-events:auto;
      font:inherit; font-weight:700; font-size:13px; color:#0d1c2b; background:var(--accent);
      border:none; border-radius:999px; padding:9px 16px; cursor:pointer; box-shadow:0 4px 14px #0008; }
    #dressup-btn:active { transform:translateY(1px); }

    /* ---- Customize (dress-up) overlay ---- */
    #customize-overlay { position:fixed; inset:0; z-index:31; display:flex; align-items:center;
      justify-content:center; padding:16px; background:#0009; }
    #customize-overlay.hidden { display:none; }
    #customize-panel { width:min(560px, 96vw); max-height:90vh; overflow:auto; background:#fbfbfe;
      color:#1a1a22; border-radius:16px; box-shadow:0 18px 50px #000a; border:3px solid #0d1c2b; padding:16px 18px; }
    #customize-panel header { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
    #customize-title { margin:0; font-size:20px; flex:1; }
    #customize-coins { font-weight:800; color:#0d1c2b; background:var(--accent); padding:4px 10px; border-radius:999px; font-size:13px; }
    #customize-close { font:inherit; font-weight:700; border:2px solid #0d1c2b; background:#122a42; color:#fff;
      border-radius:10px; padding:7px 12px; cursor:pointer; }
    #customize-tabs { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
    .cz-tab { font:inherit; font-weight:700; font-size:13px; border:2px solid #0d1c2b; background:#fff;
      color:#1a1a22; border-radius:999px; padding:6px 12px; cursor:pointer; }
    .cz-tab.active { background:#122a42; color:#fff; }
    #customize-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(96px, 1fr)); gap:8px; }
    .cz-cell { display:flex; flex-direction:column; align-items:center; gap:4px; font:inherit;
      border:2px solid #cdd6e0; background:#fff; border-radius:12px; padding:10px 6px; cursor:pointer; }
    .cz-cell.equipped { border-color:#2a7a7a; box-shadow:0 0 0 2px #2a7a7a55 inset; }
    .cz-cell.locked { opacity:.72; }
    .cz-swatch { width:34px; height:34px; border-radius:8px; border:2px solid #0d1c2b33; }
    .cz-swatch.cz-item { background:var(--tint, #ccc); }
    .cz-label { font-size:12px; font-weight:700; text-align:center; line-height:1.15; }
    .cz-state { font-size:11px; font-weight:800; color:#2a7a7a; }
    .cz-cell.locked .cz-state { color:#b06a2a; }

    /* ---- Interact prompt (shown near an interactable) ---- */
    #interact-prompt { position:fixed; z-index:6; left:50%; bottom:64px; transform:translate(-50%, 14px);
      pointer-events:auto; font:inherit; font-weight:700; font-size:14px; color:#0d1c2b; background:var(--accent);
      border:none; border-radius:999px; padding:11px 20px; cursor:pointer; opacity:0; display:none;
      box-shadow:0 6px 18px #000a; transition:opacity .15s, transform .15s; }
    #interact-prompt.show { display:inline-block; opacity:1; transform:translate(-50%, 0); }
    #interact-prompt:active { transform:translate(-50%, 2px); }

    /* ---- Coin toast (earned coins after a minigame) ---- */
    #coin-toast { position:fixed; z-index:7; left:50%; top:72px; transform:translate(-50%, -8px);
      font-weight:800; font-size:15px; color:#0b1a00; background:#86bc25; padding:8px 16px; border-radius:999px;
      box-shadow:0 4px 14px #0008; opacity:0; display:none; transition:opacity .3s, transform .3s; pointer-events:none; }
    #coin-toast.show { display:block; opacity:1; transform:translate(-50%, 0); }

    /* ---- Social HUD: Say button + emote bar ---- */
    #say-btn { position:fixed; z-index:6; right:12px; bottom:56px; pointer-events:auto; font:inherit;
      font-weight:700; font-size:13px; color:#0d1c2b; background:var(--accent); border:none; border-radius:999px;
      padding:9px 16px; cursor:pointer; box-shadow:0 4px 14px #0008; }
    #say-btn:active { transform:translateY(1px); }
    /* Decorate (edit-mode) button — den-only, stacked above Say (FROSTBYTE-HOME-PLAN §4.2). */
    #edit-btn { position:fixed; z-index:6; right:12px; bottom:98px; pointer-events:auto; font:inherit;
      font-weight:700; font-size:13px; color:#0d1c2b; background:var(--accent); border:none; border-radius:999px;
      padding:9px 16px; cursor:pointer; box-shadow:0 4px 14px #0008; }
    #edit-btn:active { transform:translateY(1px); }
    /* Island map button — pinned bottom-left, the classic corner (FROSTBYTE-HOME-PLAN §2.1);
       the emote bar shifts right to make room. */
    #map-btn { position:fixed; z-index:6; left:12px; bottom:14px; pointer-events:auto; font-size:18px;
      line-height:1; width:40px; height:40px; border:none; border-radius:12px; color:#0d1c2b;
      background:var(--accent); cursor:pointer; box-shadow:0 2px 8px #0006; }
    #map-btn:active { transform:translateY(1px); }
    #emote-bar { position:fixed; z-index:6; left:60px; bottom:14px; display:flex; gap:6px; pointer-events:auto; }
    #emote-bar[hidden] { display:none; }
    .emote-btn { font-size:18px; line-height:1; width:40px; height:40px; border:none; border-radius:12px;
      background:#ffffff1a; cursor:pointer; box-shadow:0 2px 8px #0006; }
    .emote-btn:hover { background:#ffffff33; }
    .emote-btn:active { transform:translateY(1px); }

    /* ---- Frosted-ice polish system ---- */
    :root {
      --bg:#091827; --ink:#edf8ff; --muted:#a9c6d9; --accent:#7fd6ff;
      --accent-deep:#3b8fb8; --panel:#122a42; --panel-hi:#193d59;
      --glass:#0d2238e8; --rim:#7fd6ff55; --amber:#ffba5c; --shadow:#020914cc;
    }
    html, body { background:var(--bg); color:var(--ink); font-family:"Segoe UI", system-ui, sans-serif; }
    #titlebar { padding:10px 14px 24px; background:linear-gradient(180deg, #091827f5 0%, #0d2238bd 48%, transparent 100%); }
    #titlebar .name { color:#f7fbff; letter-spacing:.9px; text-shadow:0 2px 10px #7fd6ff99; }
    #back-link, #dressup-btn, #say-btn, #edit-btn, #map-btn, .emote-btn,
    #dialogue-footer button, #customize-close, .cz-tab {
      color:var(--ink); background:linear-gradient(180deg, #193d59ed, #0d2238f2);
      border:1px solid var(--rim); box-shadow:inset 0 1px 0 #ffffff18, 0 5px 16px #02091480;
      transition:transform .14s ease, border-color .14s ease, background .14s ease, box-shadow .14s ease;
    }
    #back-link:hover, #dressup-btn:hover, #say-btn:hover, #edit-btn:hover, #map-btn:hover,
    .emote-btn:hover, #dialogue-footer button:hover, #customize-close:hover, .cz-tab:hover {
      background:linear-gradient(180deg, #245373f2, #122a42f5); border-color:#7fd6ffaa;
      box-shadow:inset 0 1px 0 #ffffff20, 0 6px 20px #020914a8, 0 0 0 1px #7fd6ff22;
    }
    #back-link:focus-visible, #dressup-btn:focus-visible, #say-btn:focus-visible, #edit-btn:focus-visible,
    #map-btn:focus-visible, .emote-btn:focus-visible, #dialogue-footer button:focus-visible,
    #customize-close:focus-visible, .cz-tab:focus-visible, .cz-cell:focus-visible {
      outline:2px solid var(--accent); outline-offset:3px;
    }
    #dressup-btn, #say-btn, #edit-btn { color:var(--ink); background:linear-gradient(180deg, #245373ed, #122a42f2); }
    #map-btn { color:var(--ink); background:linear-gradient(180deg, #245373f2, #122a42f5); }
    .emote-btn { color:var(--ink); background:#0d2238dc; }
    #coin-counter, #customize-coins { color:#091827; background:linear-gradient(135deg, #c8f4ff, #7fd6ff 58%, #65c6ef); border:1px solid #f7fbffaa; box-shadow:inset 0 1px 0 #fff, 0 5px 18px #02091499; }
    #coin-counter.bump { animation:coin-bump .38s cubic-bezier(.2,.9,.25,1.35); }

    #dialogue-overlay, #customize-overlay { background:#020914b8; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }
    #dialogue-box, #customize-panel {
      color:var(--ink); background:linear-gradient(155deg, #193d59f2, #0d2238f7 52%, #091827fa);
      border:1px solid var(--rim); border-radius:18px;
      box-shadow:inset 0 1px 0 #ffffff20, 0 22px 70px var(--shadow), 0 0 0 1px #091827;
      backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    }
    #customize-panel, #catalog-panel, #map-panel, #chat-panel, #edit-tray-strip { scrollbar-width:thin; scrollbar-color:#3b8fb8 #091827; }
    :is(#customize-panel, #catalog-panel, #map-panel, #chat-panel, #edit-tray-strip)::-webkit-scrollbar { width:9px; height:8px; }
    :is(#customize-panel, #catalog-panel, #map-panel, #chat-panel, #edit-tray-strip)::-webkit-scrollbar-track { background:#091827; }
    :is(#customize-panel, #catalog-panel, #map-panel, #chat-panel, #edit-tray-strip)::-webkit-scrollbar-thumb { background:#3b8fb8; border:2px solid #091827; border-radius:999px; }
    #dialogue-title, #customize-title { color:#f7fbff; letter-spacing:.25px; }
    #dialogue-body { color:#dcecff; }
    #dialogue-footer button { border:1px solid var(--rim); }
    #dialogue-close { background:linear-gradient(180deg, #245373, #122a42) !important; color:var(--ink); }
    #customize-close { border:1px solid var(--rim); }
    .cz-tab { border:1px solid #7fd6ff3d; color:var(--muted); }
    .cz-tab.active { color:#091827; background:linear-gradient(135deg, #c8f4ff, #7fd6ff); border-color:#c8f4ff; }
    .cz-cell { color:var(--ink); border:1px solid #7fd6ff2f; background:linear-gradient(155deg, #193d59a6, #0d2238d9); box-shadow:inset 0 1px 0 #ffffff10; }
    .cz-cell:hover { border-color:#7fd6ff99; background:linear-gradient(155deg, #245373b8, #122a42e8); transform:translateY(-1px); }
    .cz-cell.equipped { border-color:var(--accent); box-shadow:0 0 0 2px #7fd6ff35 inset, 0 7px 18px #02091466; }
    .cz-swatch { border-color:#c8f4ff66; box-shadow:inset 0 0 0 1px #09182780; }
    .cz-state { color:var(--accent); }
    .cz-cell.locked .cz-state { color:var(--amber); }

    #interact-prompt { color:#091827; background:linear-gradient(135deg, #c8f4ff, #7fd6ff); border:1px solid #f7fbffcc; box-shadow:0 8px 28px #020914b8, 0 0 22px #7fd6ff35; }
    #interact-prompt.show { animation:prompt-bob 1.8s ease-in-out .25s infinite; }
    #interact-prompt:active { animation:none; }
    #coin-toast { color:#3d2708; background:linear-gradient(135deg, #ffe2a1, #ffba5c); border:1px solid #fff0c7; box-shadow:0 8px 28px #020914b8, 0 0 20px #ffba5c33; }
    #coin-toast.show { animation:toast-pop .34s cubic-bezier(.2,.9,.25,1.2); }

    body::before { content:"FROSTBYTE"; position:fixed; inset:0; z-index:1000; display:grid; place-items:center;
      pointer-events:none; color:#f7fbff; background:radial-gradient(circle at 50% 44%, #193d59, #091827 64%);
      font-size:clamp(28px, 7vw, 64px); font-weight:900; letter-spacing:.18em; text-shadow:0 0 28px #7fd6ff88;
      animation:frostbyte-boot 1.2s ease both; }
    @keyframes frostbyte-boot { 0% { opacity:1; letter-spacing:.25em; } 52% { opacity:1; letter-spacing:.18em; } 100% { opacity:0; visibility:hidden; } }
    @keyframes prompt-bob { 0%,100% { transform:translate(-50%, 0); } 50% { transform:translate(-50%, -3px); } }
    @keyframes coin-bump { 0%,100% { transform:scale(1); } 45% { transform:scale(1.13); } }
    @keyframes toast-pop { from { opacity:0; transform:translate(-50%, -12px) scale(.9); } to { opacity:1; transform:translate(-50%, 0) scale(1); } }
    @media (prefers-reduced-motion: reduce) {
      body::before { display:none; animation:none; }
      #interact-prompt.show, #coin-toast.show, #coin-counter.bump { animation:none; }
      #back-link, #dressup-btn, #say-btn, #edit-btn, #map-btn, .emote-btn,
      #dialogue-footer button, #customize-close, .cz-tab, .cz-cell { transition:none; }
    }

    .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden;
      clip:rect(0,0,0,0); white-space:nowrap; border:0; }
  </style>
</head>
<body>
  <canvas id="game" aria-label="Frostbyte — a cosy penguin hangout"></canvas>

  <!-- HUD -->
  <div id="titlebar" class="hud">
    <div class="name">Frostbyte</div>
    <div class="spacer"></div>
    <a id="back-link" href="../">← Classic site</a>
  </div>
  <div id="coin-counter" class="hud" hidden>0 coins</div>
  <button id="dressup-btn" type="button">👕 Dress Up</button>
  <button id="interact-prompt" type="button">▶ Interact</button>
  <div id="coin-toast" role="status" aria-live="polite"></div>
  <button id="say-btn" type="button">💬 Say</button>
  <button id="edit-btn" type="button" hidden>🖌️ Decorate</button>
  <button id="map-btn" type="button" aria-label="Island map (M)" title="Island map (M)">🗺️</button>
  <div id="emote-bar" aria-label="Emotes"></div>
  <div id="chat-live" class="sr-only" aria-live="polite"></div>

  <!-- Customize (dress-up) overlay -->
  <div id="customize-overlay" class="hidden" role="dialog" aria-modal="true" aria-labelledby="customize-title">
    <div id="customize-panel">
      <header>
        <h2 id="customize-title">Dress Up</h2>
        <span id="customize-coins" aria-live="polite">0 coins</span>
        <button id="customize-close" type="button" aria-label="Close">Close ✕</button>
      </header>
      <div id="customize-tabs" role="tablist"></div>
      <div id="customize-grid"></div>
    </div>
  </div>

  <!-- Dialogue overlay -->
  <div id="dialogue-overlay" class="hidden" role="dialog" aria-modal="true" aria-labelledby="dialogue-title">
    <div id="dialogue-box">
      <header id="dialogue-header">
        <h2 id="dialogue-title"></h2>
      </header>
      <div id="dialogue-body"></div>
      <footer id="dialogue-footer">
        <button id="dialogue-close" type="button" aria-label="Close">Close ✕</button>
      </footer>
    </div>
  </div>

  <!-- SEO / no-JS fallback -->
  <noscript>
    <div style="padding:24px; max-width:640px; margin:auto;">
      <h1>Frostbyte</h1>
      <p>An original penguin hangout by Dominik Machowiak. Enable JavaScript to play it, or
         visit the <a href="https://dominikmachowiak.com">classic site</a>.</p>
    </div>
  </noscript>

  <!-- os-bridge MUST load before main.js so KAPLAY captures the right references -->
  <script src="./os-bridge.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
