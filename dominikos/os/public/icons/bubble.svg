<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Original Bubble Shooter icon authored for DominikOS. Glossy spheres drawn in code;
       the top brick-row cluster hints the grid, the dotted line + loaded bubble the shooter. -->
  <defs>
    <linearGradient id="bsBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eaeeff"/><stop offset="1" stop-color="#c1caf3"/>
    </linearGradient>
    <radialGradient id="bsRed" cx=".35" cy=".3" r=".85">
      <stop offset="0" stop-color="#ffffff"/><stop offset=".28" stop-color="#ff8a8a"/><stop offset="1" stop-color="#c0261f"/>
    </radialGradient>
    <radialGradient id="bsYel" cx=".35" cy=".3" r=".85">
      <stop offset="0" stop-color="#ffffff"/><stop offset=".28" stop-color="#ffe487"/><stop offset="1" stop-color="#dfa41c"/>
    </radialGradient>
    <radialGradient id="bsGrn" cx=".35" cy=".3" r=".85">
      <stop offset="0" stop-color="#ffffff"/><stop offset=".28" stop-color="#8ee095"/><stop offset="1" stop-color="#1f8a3b"/>
    </radialGradient>
    <radialGradient id="bsBlu" cx=".35" cy=".3" r=".85">
      <stop offset="0" stop-color="#ffffff"/><stop offset=".28" stop-color="#8ab6ff"/><stop offset="1" stop-color="#1f4fc0"/>
    </radialGradient>
    <radialGradient id="bsPur" cx=".35" cy=".3" r=".85">
      <stop offset="0" stop-color="#ffffff"/><stop offset=".28" stop-color="#c99df5"/><stop offset="1" stop-color="#6a2fb0"/>
    </radialGradient>
    <radialGradient id="bsCyn" cx=".35" cy=".3" r=".85">
      <stop offset="0" stop-color="#ffffff"/><stop offset=".28" stop-color="#9fe6ef"/><stop offset="1" stop-color="#1f9aae"/>
    </radialGradient>
  </defs>
  <rect x="3" y="3" width="42" height="42" rx="8" fill="url(#bsBg)" stroke="#98a4de" stroke-width="1.5"/>
  <!-- top cluster, brick-offset rows -->
  <circle cx="11" cy="11.5" r="4.3" fill="url(#bsRed)"/>
  <circle cx="20" cy="11.5" r="4.3" fill="url(#bsYel)"/>
  <circle cx="29" cy="11.5" r="4.3" fill="url(#bsGrn)"/>
  <circle cx="38" cy="11.5" r="4.3" fill="url(#bsPur)"/>
  <circle cx="15.5" cy="19.4" r="4.3" fill="url(#bsCyn)"/>
  <circle cx="24.5" cy="19.4" r="4.3" fill="url(#bsBlu)"/>
  <circle cx="33.5" cy="19.4" r="4.3" fill="url(#bsRed)"/>
  <!-- aim line + loaded shooter bubble -->
  <line x1="24" y1="39.5" x2="24" y2="26.5" stroke="#5a66ac" stroke-width="1.5" stroke-dasharray="2 2.4" stroke-linecap="round"/>
  <circle cx="24" cy="40" r="4.7" fill="url(#bsGrn)"/>
</svg>
