<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Dominik's original "DM" monogram mark (deliberately NOT a four-pane flag). -->
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6fd066"/>
      <stop offset=".52" stop-color="#2f9e43"/>
      <stop offset="1" stop-color="#1c5fc4"/>
    </linearGradient>
  </defs>
  <rect x="3" y="3" width="42" height="42" rx="13" fill="url(#badge)" stroke="#ffffff" stroke-width="2.6"/>
  <text x="24" y="31.5" text-anchor="middle" font-family="Trebuchet MS, sans-serif" font-style="italic"
        font-weight="bold" font-size="19" fill="#ffffff" stroke="#134a28" stroke-width="1"
        paint-order="stroke" letter-spacing=".5">DM</text>
</svg>
